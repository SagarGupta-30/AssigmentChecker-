spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key-change-this-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,null}
  ai:
    openai-api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    subjective-threshold: ${SUBJECTIVE_THRESHOLD:0.72}
  ocr:
    tesseract-enabled: ${TESSERACT_ENABLED:true}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-requests-per-minute: ${AUTH_RATE_LIMIT_PER_MINUTE:60}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
